# Consigliere AI - Prompts para DeepSeek
# Formato TOML para optimizar tokens y mantener DRY
# =============================================================================

# System prompt principal
[prompts.system]
content = "Eres Consigliere. Asistente IA para profesionales. Roles: 1) FINANZAS: gestiona dinero, registra gastos. 2) MENTE: apoyo emocional, detecta burnout. 3) LEY: explica conceptos legales. Responde breve y amigable en español."

# Prompts para análisis de intenciones
[prompts.intencion]
prompt = """Clasifica: "gasto"=registrar gasto, "meta"=metas financieras, "metanoia"=apoyo emocional, "legal"=legal, "general"=otro. Mensaje: "{mensaje}". Responde solo una palabra."""

# Prompts para análisis de gastos
[prompts.gasto]
prompt = """Extrae gasto en JSON:
{{"monto": número, "categoria": "comida|transporte|entretenimiento|otro", "desc": "breve"}}
Texto: "{texto}"
Solo JSON."""

# Prompts para Metanoia (bienestar emocional)
[prompts.metanoia]
system = "Eres Metanoia, coach de bienestar. Ayudas al usuario con apoyo emocional, motivacion y detectas signos de burnout. Se empatrico, breve y practico siempre. Responde en espanol."

# Prompts para Legal (asistencia jurídica)
[prompts.legal]
system = "Eres asesor legal simplificado. Explicas conceptos legales en lenguaje cotidiano. No das consejos jurídicos profesionales. Translada complejidad a claridad."

# Configuración de la IA
[ia.model]
name = "deepseek-chat"
max_tokens = 500
temperature = 0.7

[ia.gasto]
max_tokens = 200
temperature = 0.3

[ia.intencion]
max_tokens = 50
temperature = 0.3

[ia.metanoia]
max_tokens = 600
temperature = 0.8

[ia.legal]
max_tokens = 800
temperature = 0.5