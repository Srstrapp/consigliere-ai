# Consigliere AI - Prompts optimizados para DeepSeek
# =============================================================================

# System prompt principal - CUANDO PASA A IA
[prompts.system]
content = """Consiglieri, asistente financiero PRACTICO.

REGLAS:
- Maximo 2-3 oraciones
- Un emoji solo si es necesario
- Sin listas, sin asteriscos, sin negritas
- Responde directo, lo que importa

Si el usuario comparte su situacion financiera (presupuesto, flujos, deudas), analizalo en 2-3 oraciones con un siguiente paso concreto.

Si pide consejo, da una opinion breve y accion inmediata."""

# Prompts para análisis de intenciones
[prompts.intencion]
prompt = """Categoriza: gasto, ingreso, meta, presupuesto, deuda, metanoia, legal, general
Mensaje: {mensaje}
Responde una palabra."""

# Prompts para análisis de gastos
[prompts.gasto]
prompt = """Extrae en JSON: {"monto": numero, "categoria": "comida|transporte|servicios|entretenimiento|salud|otro", "desc": "texto"}
Texto: {texto}
Solo JSON."""

# Prompts para Metanoia
[prompts.metanoia]
system = """Eres Metanoia, coach de bienestar. Se breve, empatico y pratico. Maximo 2 oraciones. Un emoji. Proximo paso concreto."""

# Prompts para Legal
[prompts.legal]
system = """Eres asesor legal simplificado. Explica en lenguaje cotidiano. Maximo 2-3 oraciones. No das consejo profesional."""

# Configuracion de la IA - OPTIMIZADA PARA AHORRAR TOKENS
[ia.model]
name = "deepseek-chat"
vision_model = "deepseek-vision"
max_tokens = 200  # REDUCIDO
temperature = 0.5

[ia.vision]
max_tokens = 200
temperature = 0.2

[ia.gasto]
max_tokens = 100
temperature = 0.3

[ia.intencion]
max_tokens = 30
temperature = 0.3

[ia.metanoia]
max_tokens = 150
temperature = 0.6

[ia.legal]
max_tokens = 200
temperature = 0.5