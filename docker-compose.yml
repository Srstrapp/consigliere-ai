# Consigliere AI - Docker Compose
# Levanta el backend + Evolution API para WhatsApp

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    restart: unless-stopped
    depends_on:
      - evolution-api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Evolution API para WhatsApp
  # Documentación: https://github.com/atendai/evolution-api
  evolution-api:
    image: atendai/evolution-api:latest
    ports:
      - "8080:8080"
    environment:
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - AUTH_API_KEY=consigliere_wa_key_2024  # Cambiá esto en producción
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION=${DATABASE_URL:-postgresql://postgres:postgres@db:5432/evolution}
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_CONTACT=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      - WEBHOOK_GLOBAL_ENABLED=false
      - CONFIG_SESSION_PHONE_CLIENT=ConsigliereAI
      - CONFIG_SESSION_NAME=consigliere
    restart: unless-stopped
    depends_on:
      - db

  # Base de datos para Evolution API
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=evolution
    volumes:
      - evolution-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  evolution-data:

networks:
  default:
    name: consigliere-network